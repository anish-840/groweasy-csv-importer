# Local containerised setup:
#   GEMINI_API_KEY=your_key docker compose up --build
# Then open http://localhost:3000  (API on http://localhost:8080)

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      PORT: 8080
      CORS_ORIGIN: '*'
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/health']
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # The browser reaches the API on the host-published port.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      - api
