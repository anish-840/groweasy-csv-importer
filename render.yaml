# Render Blueprint for the backend API.
# In Render: New → Blueprint → pick this repo. Set GEMINI_API_KEY when prompted.
services:
  - type: web
    name: groweasy-api
    runtime: node
    plan: free
    # --include=dev is required because Render sets NODE_ENV=production, under
    # which npm would otherwise skip devDependencies (tsup, typescript) and the
    # build would fail with "tsup: not found".
    buildCommand: npm ci --include=dev && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NODE_ENV
        value: production
      # Set this to your deployed web origin to lock down CORS.
      - key: CORS_ORIGIN
        value: '*'
